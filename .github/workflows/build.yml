name: Build Firmware

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYBOARD: keychron/q11/iso_encoder
      KEYMAP: custom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: carlosperate/arm-none-eabi-gcc-action@v1

      - name: Install build dependencies
        run: sudo apt-get install -y dfu-util

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install QMK CLI
        run: python3 -m pip install qmk

      - name: Setup QMK firmware
        run: qmk setup -y -H .build/qmk_firmware

      - name: Clone SOCD cleaner module
        run: |
          git clone --depth 1 https://github.com/getreuer/qmk-modules.git \
            .build/qmk_firmware/modules/getreuer

      - name: Copy keymap into QMK tree
        run: |
          KEYMAP_DIR=".build/qmk_firmware/keyboards/${KEYBOARD}/keymaps/${KEYMAP}"
          mkdir -p "${KEYMAP_DIR}"
          cp keymap.c keymap.json config.h rules.mk "${KEYMAP_DIR}/"

      - name: Compile firmware
        run: qmk compile -kb $KEYBOARD -km $KEYMAP -j $(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .build/qmk_firmware/*.bin
            .build/qmk_firmware/*.hex
            .build/qmk_firmware/*.uf2
